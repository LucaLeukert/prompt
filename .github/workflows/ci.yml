name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Validate repository wiring
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source and Ghostty submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify source sync and patch
        run: |
          ./Scripts/sync-ghostty.sh
          git diff --check
          git -C Vendor/ghostty diff --check

      - name: Validate shell scripts
        run: |
          sh -n Scripts/build.sh
          sh -n Scripts/run.sh
          sh -n Scripts/sync-ghostty.sh
          sh -n Scripts/test.sh
