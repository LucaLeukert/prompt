name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Validate repository wiring
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source and Ghostty submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify source sync and patch
        run: |
          make sync
          git diff --check
          git -C Vendor/ghostty diff --check

      - name: Validate Xcode workspace metadata
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("Prompt.xcworkspace/contents.xcworkspacedata")
          ET.parse("Prompt.xcworkspace/xcshareddata/xcschemes/Prompt App.xcscheme")
          PY
